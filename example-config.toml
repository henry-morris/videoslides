# VideoSlides Configuration
# This file defines the slide order, durations, and page ranges

[settings]
# output_cache = "~/.cache/videoslides"  # default
output_video = "presentation.mp4"
resolution = [1920, 1080]
fps = 5
keyframe_interval = 15
background_color = "black"

# Define slides in the order they should appear in the video
# Each slide specifies:
# - filename: PDF file to process
# - duration: seconds to display each page
# - pages: which pages to include ("all", "1", "1-3", "2,4-6", etc.)
#
# Optional (used by presentslides interactive viewer):
# - title: short label shown on the info bar (press T to toggle)
# - show_page_number: show PDF page number on the info bar (default false)
# - show_progress_bar: animated progress bar at bottom (default false)
# - progress_bar_color: bar color, hex or name (default white)
# - progress_bar_height: bar height in pixels (default 6)

[[slides]]
filename = "1 15.pdf"
duration = 10
pages = "all"
title = "Introduction"
show_page_number = true

[[slides]]
filename = "2 15.pdf"
duration = 15
pages = "1-3"
title = "Main Topic"
show_page_number = true
show_progress_bar = true
progress_bar_color = "#1f4305"

[[slides]]
filename = "3 15.pdf"
duration = 8
pages = "all"
title = "Summary"